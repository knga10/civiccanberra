function clamp(n, min, max) {
  return Math.max(min, Math.min(max, n));
}

function relevanceLabel(score) {
  if (score >= 75) return { label: "High impact", tone: "high" };
  if (score >= 40) return { label: "Some impact", tone: "mid" };
  return { label: "Low impact", tone: "low" };
}

const STORAGE_KEY = "act-budget-profile-v1";

function loadProfile() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return { ...initialProfile, ...parsed };
  } catch {
    return null;
  }
}

    const saved = loadProfile();

            <div className="by-category">
              <h3>By area of the Budget</h3>
              <p className="category-rationale">
                Each score is the average relevance (0–100) of every measure we found in that
                category, based on your answers. A category scores high if most of its measures
                are tailored to people like you (e.g. your tenure, location, family or interests);
                it scores lower if most measures there are broad, Territory-wide investments that
                apply to everyone roughly equally. Tap a line in the ledger above for the
                reasoning behind each individual score.
              </p>
              <div className="category-grid">
                {CATEGORY_ORDER.map((cat) => {
                  const items = byCategory[cat] || [];
                  const avg = Math.round(items.reduce((s, i) => s + i.score, 0) / items.length);
                  return (
                    <div key={cat} className={`category-card score-${relevanceLabel(avg).tone}`}>
                      <div className="category-card-top">
                        <h4>{cat}</h4>
                        <span className="category-score">{avg}</span>
                      </div>
                      <div className="meter">
                        <div className="meter-fill" style={{ width: `${avg}%` }} />
                      </div>
                      <p className="category-note">{relevanceLabel(avg).label}</p>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="actions">
              <button className="btn-secondary" onClick={() => setStep(1)}>
                ← Edit my details
              </button>
              <button className="btn-secondary" onClick={() => {
                try { localStorage.removeItem(STORAGE_KEY); } catch {}
                setProfile(initialProfile);
                setStep(0);
                setShowAll(false);
              }}>
                Start over
              </button>
            </div>

            <p className="fine-print">
              Source: ACT Budget at a Glance 2026–27, ACT Treasury. This statement is a simplified,
              illustrative guide generated from your inputs and does not constitute financial,
              legal or eligibility advice. Check act.gov.au for official eligibility criteria.
            </p>
          </div>
        </section>
      )}
    </div>
  );
}

function tenureLabel(t) {
  return { owner: "Homeowner", renting: "Renter", buying: "Looking to buy", publicHousing: "Public housing tenant" }[t] || "";
}

function FormStep({ title, subtitle, children, onNext, onBack, nextLabel, onNextOverride }) {
  return (
    <section className="form-step">
      <div className="form-inner">
        <p className="eyebrow">{subtitle}</p>
        <h2>{title}</h2>
        <div className="form-body">{children}</div>
        <div className="form-nav">
          <button className="btn-text" onClick={onBack}>← Back</button>
          <button className="btn-primary" onClick={onNextOverride || onNext}>{nextLabel || "Continue →"}</button>
        </div>
      </div>
    </section>
  );
}

function Field({ label, children }) {
  return (
    <div className="field">
      {label && <label className="field-label">{label}</label>}
      <div className="field-body">{children}</div>
    </div>
  );
}

function CheckRow({ checked, onChange, label }) {
  return (
    <label className="check-row">
      <input type="checkbox" checked={checked} onChange={onChange} />
      <span>{label}</span>
    </label>
  );
}

function RadioRow({ name, value, onChange, options }) {
  return (
    <div className="radio-row">
      {options.map((opt) => (
        <label key={opt.value} className={`radio-pill ${value === opt.value ? "active" : ""}`}>
          <input
            type="radio"
            name={name}
            value={opt.value}
            checked={value === opt.value}
            onChange={() => onChange(opt.value)}
          />
          <span>{opt.label}</span>
        </label>
      ))}
    </div>
  );
}

function Chip({ active, onClick, children }) {
  return (
    <button type="button" className={`chip ${active ? "active" : ""}`} onClick={onClick}>
      {children}
    </button>
  );
}

function LedgerLine({ item }) {
  const [open, setOpen] = useState(false);
  const tone = relevanceLabel(item.score);
  return (
    <div className={`ledger-line score-${tone.tone}`}>
      <button className="ledger-row" onClick={() => setOpen((o) => !o)}>
        <span className="ledger-cat">{item.category}</span>
        <span className="ledger-title">{item.title}</span>
        <span className="ledger-figure">{item.figure}</span>
        <span className="ledger-score">
          <span className="dot" />
          {tone.label}
        </span>
        <span className="chevron">{open ? "−" : "+"}</span>
      </button>
      {open && (
        <div className="ledger-detail">
          <p>{item.detail}</p>
          <p className="why"><strong>For you:</strong> {item.whyText}</p>
          {item.source && (
            <p className="source-link">
              <a href={item.source} target="_blank" rel="noopener noreferrer">
                Read this section in the Budget reference ↗
              </a>
              {" · "}
              <a href={SOURCE_PDF} target="_blank" rel="noopener noreferrer">
                Official PDF ↗
              </a>
            </p>
          )}
        </div>
      )}
    </div>
  );
}
